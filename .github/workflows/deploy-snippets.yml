name: Deploy Cloudflare Snippets

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Upload all snippets and sync rules
    runs-on: ubuntu-latest

    steps:

      # ── 1. Check out the repository code ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Parse rules file and validate everything before deploying ──
      # Reads every snippet_name from rules/snippet_rules.json and
      # checks that a matching .js file exists in snippets/
      # Fails fast with a clear error before any API calls are made
      - name: Validate rules file and JS files
        run: |
          echo "Parsing rules/snippet_rules.json..."

          python3 -c "
          import json, sys, os

          with open('rules/snippet_rules.json') as f:
              rules = json.load(f)

          if 'rules' not in rules or not isinstance(rules['rules'], list):
              print('::error::rules/snippet_rules.json must have a top-level \"rules\" array')
              sys.exit(1)

          if len(rules['rules']) == 0:
              print('::error::rules/snippet_rules.json has no rules defined')
              sys.exit(1)

          errors = []
          names = []
          for rule in rules['rules']:
              name = rule.get('snippet_name')
              if not name:
                  errors.append(f'A rule is missing snippet_name: {rule}')
                  continue
              names.append(name)
              js_file = f'snippets/{name}.js'
              if not os.path.isfile(js_file):
                  errors.append(f'Missing JS file: {js_file}')

          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)

          print(f'Validation passed. Snippets to deploy: {names}')
          "

      # ── 3. Upload each snippet JS file to Cloudflare ─────────────────
      # Reads every snippet_name from rules/snippet_rules.json
      # Loops through and uploads each corresponding snippets/{name}.js
      # API: PUT /zones/{zone_id}/snippets/{snippet_name}
      # Uses multipart/form-data with the JS file and metadata field
      - name: Upload all snippets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          SNIPPET_NAMES=$(python3 -c "
          import json
          rules = json.load(open('rules/snippet_rules.json'))
          print(' '.join(r['snippet_name'] for r in rules['rules']))
          ")

          echo "Snippets to upload: $SNIPPET_NAMES"

          for SNIPPET_NAME in $SNIPPET_NAMES; do
            echo ""
            echo "======================================"
            echo "Uploading: $SNIPPET_NAME"
            echo "======================================"

            HTTP_STATUS=$(curl -s -o /tmp/snippet_response.json -w "%{http_code}" \
              --request PUT \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/snippets/$SNIPPET_NAME" \
              --header "Authorization: Bearer $CF_API_TOKEN" \
              --header "Content-Type: multipart/form-data" \
              --form "files=@snippets/$SNIPPET_NAME.js;filename=$SNIPPET_NAME.js" \
              --form "metadata={\"main_module\":\"$SNIPPET_NAME.js\"}")

            echo "--- Cloudflare API response ---"
            cat /tmp/snippet_response.json | python3 -m json.tool
            echo "-------------------------------"
            echo "HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "::error::Failed to upload '$SNIPPET_NAME' — HTTP $HTTP_STATUS"
              exit 1
            fi

            SUCCESS=$(python3 -c \
              "import json; d=json.load(open('/tmp/snippet_response.json')); print(d.get('success', False))")

            if [ "$SUCCESS" != "True" ]; then
              echo "::error::Cloudflare API returned success=false for '$SNIPPET_NAME'"
              exit 1
            fi

            echo "'$SNIPPET_NAME' uploaded successfully."
          done

      # ── 4. Push the full rules file to Cloudflare once ───────────────
      # Runs once after all snippets are uploaded
      # Sends the entire rules/snippet_rules.json to Cloudflare
      # This replaces all existing snippet rules on the zone
      # API: PUT /zones/{zone_id}/snippets/snippet_rules
      - name: Sync snippet rules
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          echo "Pushing rules/snippet_rules.json to Cloudflare..."

          HTTP_STATUS=$(curl -s -o /tmp/rules_response.json -w "%{http_code}" \
            --request PUT \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/snippets/snippet_rules" \
            --header "Authorization: Bearer $CF_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data @rules/snippet_rules.json)

          echo "--- Cloudflare API response ---"
          cat /tmp/rules_response.json | python3 -m json.tool
          echo "-------------------------------"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Rules sync failed — HTTP $HTTP_STATUS"
            exit 1
          fi

          SUCCESS=$(python3 -c \
            "import json; d=json.load(open('/tmp/rules_response.json')); print(d.get('success', False))")

          if [ "$SUCCESS" != "True" ]; then
            echo "::error::Cloudflare API returned success=false for rules sync"
            exit 1
          fi

          echo "Rules synced successfully."

      # ── 5. Verify every snippet is live on the zone ───────────────────
      # Loops through every snippet_name from rules/snippet_rules.json
      # and confirms each one exists on Cloudflare after deployment
      - name: Verify all deployments
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          SNIPPET_NAMES=$(python3 -c "
          import json
          rules = json.load(open('rules/snippet_rules.json'))
          print(' '.join(r['snippet_name'] for r in rules['rules']))
          ")

          ALL_GOOD=true

          for SNIPPET_NAME in $SNIPPET_NAMES; do
            echo ""
            echo "======================================"
            echo "Verifying: $SNIPPET_NAME"
            echo "======================================"

            HTTP_STATUS=$(curl -s -o /tmp/verify_response.json -w "%{http_code}" \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/snippets/$SNIPPET_NAME" \
              --header "Authorization: Bearer $CF_API_TOKEN")

            cat /tmp/verify_response.json | python3 -m json.tool
            echo "HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "::error::Verification failed for '$SNIPPET_NAME' — HTTP $HTTP_STATUS"
              ALL_GOOD=false
            else
              echo "'$SNIPPET_NAME' is live."
            fi
          done

          if [ "$ALL_GOOD" != "true" ]; then
            exit 1
          fi

          echo ""
          echo "All snippets deployed and verified successfully."