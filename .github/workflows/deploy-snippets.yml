name: Deploy Cloudflare Snippets

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Upload all snippets and sync rules
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:

      # ── 1. Checkout the repository ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Pre-flight — confirm secrets are set and not empty ─────────
      - name: Validate secrets are set
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          ERRORS=0

          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Secret CF_API_TOKEN is not set or is empty."
            ERRORS=$((ERRORS + 1))
          else
            echo "CF_API_TOKEN is set ✓"
          fi

          if [ -z "$CF_ZONE_ID" ]; then
            echo "::error::Secret CF_ZONE_ID is not set or is empty."
            ERRORS=$((ERRORS + 1))
          else
            LEN=${#CF_ZONE_ID}
            LAST4="${CF_ZONE_ID: -4}"
            echo "CF_ZONE_ID is set ✓  (length=${LEN}, ends with ...${LAST4})"
            if [ "$LEN" -ne 32 ]; then
              echo "::error::CF_ZONE_ID should be exactly 32 characters (got ${LEN}). Check for spaces or line breaks in the secret value."
              ERRORS=$((ERRORS + 1))
            fi
          fi

          if [ "$ERRORS" -ne 0 ]; then
            exit 1
          fi

          echo "All secrets validated."

      # ── 3. Pre-flight — verify the API token is valid ─────────────────
      - name: Verify API token
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "Verifying API token against Cloudflare..."

          HTTP_STATUS=$(curl -s -o /tmp/token_check.json -w "%{http_code}" \
            --request GET \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            --header "Authorization: Bearer ${CF_API_TOKEN}")

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/token_check.json | python3 -m json.tool

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::API token verification failed — HTTP $HTTP_STATUS"
            exit 1
          fi

          SUCCESS=$(jq -r '.success' /tmp/token_check.json)
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Cloudflare rejected the API token. Re-create it at dash.cloudflare.com → My Profile → API Tokens."
            exit 1
          fi

          echo "API token is valid ✓"

      # ── 4. Pre-flight — verify zone ID is accessible ──────────────────
      - name: Verify Zone ID
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          echo "Verifying Zone ID against Cloudflare..."

          HTTP_STATUS=$(curl -s -o /tmp/zone_check.json -w "%{http_code}" \
            --request GET \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}" \
            --header "Authorization: Bearer ${CF_API_TOKEN}")

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/zone_check.json | python3 -m json.tool

          if [ "$HTTP_STATUS" == "404" ]; then
            echo "::error::Zone not found — CF_ZONE_ID may be wrong."
            exit 1
          fi

          if [ "$HTTP_STATUS" == "403" ]; then
            echo "::error::Access denied — token does not have permission for this zone."
            exit 1
          fi

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Unexpected response — HTTP $HTTP_STATUS"
            exit 1
          fi

          ZONE_NAME=$(jq -r '.result.name' /tmp/zone_check.json)
          echo "Zone verified ✓  (zone name: ${ZONE_NAME})"

      # ── 5. Validate rules file and all JS files exist ─────────────────
      - name: Validate rules file and JS files
        run: |
          RULES_FILE="$GITHUB_WORKSPACE/rules/snippet_rules.json"

          if [ ! -f "$RULES_FILE" ]; then
            echo "::error::rules/snippet_rules.json not found"
            exit 1
          fi

          if [ ! -s "$RULES_FILE" ]; then
            echo "::error::rules/snippet_rules.json is empty"
            exit 1
          fi

          echo "Rules file contents:"
          echo "---"
          cat "$RULES_FILE"
          echo ""
          echo "---"

          # Validate it is parseable JSON with a rules array
          if ! jq empty "$RULES_FILE" 2>/dev/null; then
            echo "::error::rules/snippet_rules.json is not valid JSON"
            exit 1
          fi

          RULE_COUNT=$(jq '.rules | length' "$RULES_FILE")
          if [ "$RULE_COUNT" -eq 0 ]; then
            echo "::error::rules/snippet_rules.json has an empty rules array"
            exit 1
          fi

          echo "Found $RULE_COUNT rule(s). Checking each snippet..."

          ERRORS=0

          # Loop through every snippet_name in the rules array
          for SNIPPET_NAME in $(jq -r '.rules[].snippet_name' "$RULES_FILE"); do
            JS_FILE="$GITHUB_WORKSPACE/snippets/${SNIPPET_NAME}.js"
            if [ ! -f "$JS_FILE" ]; then
              echo "::error::Missing JS file for '${SNIPPET_NAME}': snippets/${SNIPPET_NAME}.js"
              ERRORS=$((ERRORS + 1))
            else
              echo "snippets/${SNIPPET_NAME}.js ✓"
            fi
          done

          if [ "$ERRORS" -ne 0 ]; then
            exit 1
          fi

          echo "Validation passed."

      # ── 6. Upload each snippet JS file to Cloudflare ─────────────────
      # API: PUT /zones/{zone_id}/snippets/{snippet_name}
      - name: Upload all snippets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          RULES_FILE="$GITHUB_WORKSPACE/rules/snippet_rules.json"
          SNIPPET_NAMES=$(jq -r '.rules[].snippet_name' "$RULES_FILE")

          echo "Snippets to upload:"
          echo "$SNIPPET_NAMES"

          for SNIPPET_NAME in $SNIPPET_NAMES; do
            echo ""
            echo "======================================"
            echo "Uploading: $SNIPPET_NAME"
            echo "======================================"

            JS_FILE="$GITHUB_WORKSPACE/snippets/${SNIPPET_NAME}.js"
            echo "JS file: $JS_FILE"

            HTTP_STATUS=$(curl -s -o /tmp/snippet_response.json -w "%{http_code}" \
              --request PUT \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/snippets/${SNIPPET_NAME}" \
              --header "Authorization: Bearer ${CF_API_TOKEN}" \
              --header "Content-Type: multipart/form-data" \
              --form "files=@${JS_FILE};filename=${SNIPPET_NAME}.js" \
              --form "metadata={\"main_module\":\"${SNIPPET_NAME}.js\"}")

            echo "HTTP status: $HTTP_STATUS"
            echo "--- Cloudflare API response ---"
            cat /tmp/snippet_response.json | python3 -m json.tool
            echo "-------------------------------"

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "::error::Failed to upload '${SNIPPET_NAME}' — HTTP $HTTP_STATUS"
              exit 1
            fi

            SUCCESS=$(jq -r '.success' /tmp/snippet_response.json)
            if [ "$SUCCESS" != "true" ]; then
              echo "::error::Cloudflare returned success=false for '${SNIPPET_NAME}'"
              exit 1
            fi

            echo "'${SNIPPET_NAME}' uploaded successfully ✓"
          done

      # ── 7. Push the full rules file to Cloudflare once ───────────────
      # API: PUT /zones/{zone_id}/snippets/snippet_rules
      - name: Sync snippet rules
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          RULES_FILE="$GITHUB_WORKSPACE/rules/snippet_rules.json"
          echo "Pushing rules to Cloudflare..."

          HTTP_STATUS=$(curl -s -o /tmp/rules_response.json -w "%{http_code}" \
            --request PUT \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/snippets/snippet_rules" \
            --header "Authorization: Bearer ${CF_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "@${RULES_FILE}")

          echo "HTTP status: $HTTP_STATUS"
          echo "--- Cloudflare API response ---"
          cat /tmp/rules_response.json | python3 -m json.tool
          echo "-------------------------------"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Rules sync failed — HTTP $HTTP_STATUS"
            exit 1
          fi

          SUCCESS=$(jq -r '.success' /tmp/rules_response.json)
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Cloudflare returned success=false for rules sync"
            exit 1
          fi

          echo "Rules synced successfully ✓"

      # ── 8. Verify every snippet is live on the zone ───────────────────
      - name: Verify all deployments
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          RULES_FILE="$GITHUB_WORKSPACE/rules/snippet_rules.json"
          SNIPPET_NAMES=$(jq -r '.rules[].snippet_name' "$RULES_FILE")
          ALL_GOOD=true

          for SNIPPET_NAME in $SNIPPET_NAMES; do
            echo ""
            echo "======================================"
            echo "Verifying: $SNIPPET_NAME"
            echo "======================================"

            HTTP_STATUS=$(curl -s -o /tmp/verify_response.json -w "%{http_code}" \
              --request GET \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/snippets/${SNIPPET_NAME}" \
              --header "Authorization: Bearer ${CF_API_TOKEN}")

            echo "HTTP status: $HTTP_STATUS"
            cat /tmp/verify_response.json | python3 -m json.tool

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "::error::Verification failed for '${SNIPPET_NAME}' — HTTP $HTTP_STATUS"
              ALL_GOOD=false
            else
              echo "'${SNIPPET_NAME}' is live ✓"
            fi
          done

          if [ "$ALL_GOOD" != "true" ]; then
            exit 1
          fi

          echo ""
          echo "All snippets deployed and verified successfully."